stages:
  - lint
  - build
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  HELM_CHART_PATH: "helm-charts/voting-app"
  HELM_RELEASE_NAME: "voting-app"
  HELM_NAMESPACE: "default"
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  REGISTRY_BASE: $CI_REGISTRY/devops/devops-2026-03/example-voting-app

# ============================================
# 1. LINT HELM-ЧАРТА (только если есть изменения в чарте)
# ============================================
helm-lint:
  stage: lint
  image: alpine:latest
  before_script:
    - apk add --no-cache helm
  script:
    - helm lint $HELM_CHART_PATH --strict
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - helm-charts/**/*

# ============================================
# 2. СБОРКА DOCKER-ОБРАЗОВ
# ============================================
build_vote:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  needs:
    - job: helm-lint
      optional: true
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - echo "🔨 Собираем образ voting-app..."
    - docker build -t $REGISTRY_BASE/voting-app:$IMAGE_TAG ./vote
    - docker push $REGISTRY_BASE/voting-app:$IMAGE_TAG
    - docker tag $REGISTRY_BASE/voting-app:$IMAGE_TAG $REGISTRY_BASE/voting-app:latest
    - docker push $REGISTRY_BASE/voting-app:latest
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - vote/**/*
        - Dockerfile
  allow_failure: false

build_result:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  needs:
    - job: helm-lint
      optional: true
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - echo "🔨 Собираем образ result-app..."
    - docker build -t $REGISTRY_BASE/result-app:$IMAGE_TAG ./result
    - docker push $REGISTRY_BASE/result-app:$IMAGE_TAG
    - docker tag $REGISTRY_BASE/result-app:$IMAGE_TAG $REGISTRY_BASE/result-app:latest
    - docker push $REGISTRY_BASE/result-app:latest
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - result/**/*
        - Dockerfile
  allow_failure: false

build_worker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  needs:
    - job: helm-lint
      optional: true
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - echo "🔨 Собираем образ worker-app..."
    - docker build --build-arg BUILDPLATFORM=linux/amd64 --build-arg TARGETPLATFORM=linux/amd64 --build-arg TARGETARCH=amd64 -t $REGISTRY_BASE/worker-app:$IMAGE_TAG ./worker
    - docker push $REGISTRY_BASE/worker-app:$IMAGE_TAG
    - docker tag $REGISTRY_BASE/worker-app:$IMAGE_TAG $REGISTRY_BASE/worker-app:latest
    - docker push $REGISTRY_BASE/worker-app:latest
  tags:
    - docker
  # cache:
  #   key: "worker-docker-cache"
  #   paths:
  #     - /var/lib/docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - worker/**/*
        - Dockerfile
  allow_failure: false

# ============================================
# 3. ДЕПЛОЙ ЧЕРЕЗ HELM
# ============================================
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl bash helm jq
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - echo "$KUBECONFIG_CONTENT" > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
    - kubectl get nodes
    
    - |
      kubectl create secret docker-registry gitlab-registry \
        --docker-server=$CI_REGISTRY \
        --docker-username=$CI_REGISTRY_USER \
        --docker-password=$CI_REGISTRY_PASSWORD \
        --docker-email=ci@example.com \
        -n $HELM_NAMESPACE \
        --dry-run=client -o yaml | kubectl apply -f -
    
    - |
      kubectl patch serviceaccount default -n $HELM_NAMESPACE -p '{"imagePullSecrets": [{"name": "gitlab-registry"}]}'
    
    - helm uninstall $HELM_RELEASE_NAME -n $HELM_NAMESPACE --ignore-not-found
  script:
    - cd $HELM_CHART_PATH
    - |
      helm install $HELM_RELEASE_NAME . \
        --namespace $HELM_NAMESPACE \
        --create-namespace \
        --set imagePullSecrets[0].name=gitlab-registry \
        --set ingress.enabled=true \
        --set ingress.className=nginx \
        --set ingress.annotations.'cert-manager\.io/cluster-issuer'=letsencrypt-prod \
        --set ingress.hosts.vote=vote.ddgames.ru \
        --set ingress.hosts.result=result.ddgames.ru \
        --set ingress.tls.enabled=true \
        --set ingress.tls.voteSecretName=vote-tls \
        --set ingress.tls.resultSecretName=result-tls
  environment:
    name: production
    url: https://vote.ddgames.ru
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual