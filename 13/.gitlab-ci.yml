stages:
  - lint
  - build
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  HELM_CHART_PATH: "helm-charts/voting-app"
  HELM_RELEASE_NAME: "voting-app"
  HELM_NAMESPACE: "default"
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

# ============================================
# 1. LINT HELM-ЧАРТА
# ============================================
helm-lint:
  stage: lint
  image: alpine:latest
  before_script:
    - apk add --no-cache helm
  script:
    - helm lint $HELM_CHART_PATH --strict
  tags:
    - docker

# ============================================
# 2. СБОРКА DOCKER-ОБРАЗОВ (ТОЛЬКО ПОСЛЕ УСПЕШНОГО LINT)
# ============================================
build_vote:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  needs:
    - helm-lint
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - docker build -t $CI_REGISTRY/devops/devops-2026-03/example-voting-app/voting-app:$IMAGE_TAG ./vote
    - docker push $CI_REGISTRY/devops/devops-2026-03/example-voting-app/voting-app:$IMAGE_TAG
  tags:
    - docker
  only:
    - main

build_result:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  needs:
    - helm-lint
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - docker build -t $CI_REGISTRY/devops/devops-2026-03/example-voting-app/result-app:$IMAGE_TAG ./result
    - docker push $CI_REGISTRY/devops/devops-2026-03/example-voting-app/result-app:$IMAGE_TAG
  tags:
    - docker
  only:
    - main

build_worker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  needs:
    - helm-lint
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - docker build --build-arg BUILDPLATFORM=linux/amd64 --build-arg TARGETPLATFORM=linux/amd64 --build-arg TARGETARCH=amd64 -t $CI_REGISTRY/devops/devops-2026-03/example-voting-app/worker-app:$IMAGE_TAG ./worker
    - docker push $CI_REGISTRY/devops/devops-2026-03/example-voting-app/worker-app:$IMAGE_TAG
  tags:
    - docker
  only:
    - main

# ============================================
# 3. ДЕПЛОЙ ЧЕРЕЗ HELM
# ============================================
deploy:
  stage: deploy
  image: alpine:latest
  needs:
    - build_vote
    - build_result
    - build_worker
  before_script:
    - apk add --no-cache curl bash helm
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - echo "$KUBECONFIG_CONTENT" > /tmp/kubeconfig
    - export KUBECONFIG=/tmp/kubeconfig
    - kubectl get nodes
    
    - |
      kubectl create secret docker-registry gitlab-registry \
        --docker-server=$CI_REGISTRY \
        --docker-username=$CI_REGISTRY_USER \
        --docker-password=$CI_REGISTRY_PASSWORD \
        --docker-email=ci@example.com \
        -n $HELM_NAMESPACE \
        --dry-run=client -o yaml | kubectl apply -f -
    
    - |
      kubectl patch serviceaccount default -n $HELM_NAMESPACE -p '{"imagePullSecrets": [{"name": "gitlab-registry"}]}'
    
    - helm uninstall $HELM_RELEASE_NAME -n $HELM_NAMESPACE --ignore-not-found
  script:
    - cd $HELM_CHART_PATH
    - |
      helm install $HELM_RELEASE_NAME . \
        --namespace $HELM_NAMESPACE \
        --create-namespace \
        --set imageTag=$IMAGE_TAG \
        --set images.vote=$CI_REGISTRY/devops/devops-2026-03/example-voting-app/voting-app \
        --set images.result=$CI_REGISTRY/devops/devops-2026-03/example-voting-app/result-app \
        --set images.worker=$CI_REGISTRY/devops/devops-2026-03/example-voting-app/worker-app \
        --set imagePullSecrets[0].name=gitlab-registry \
        --set ingress.enabled=true \
        --set ingress.className=nginx \
        --set ingress.annotations.'cert-manager\.io/cluster-issuer'=letsencrypt-prod \
        --set ingress.hosts.vote=vote.ddgames.ru \
        --set ingress.hosts.result=result.ddgames.ru \
        --set ingress.tls.enabled=true \
        --set ingress.tls.voteSecretName=vote-tls \
        --set ingress.tls.resultSecretName=result-tls \
        --wait \
        --timeout 5m
    
    - kubectl get pods -n $HELM_NAMESPACE
    - kubectl get svc -n $HELM_NAMESPACE
    - kubectl get ingress -n $HELM_NAMESPACE
    
    - |
      INGRESS_IP=$(kubectl get svc ingress-nginx-controller -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
      echo "Ingress IP: $INGRESS_IP"
      curl -s -o /dev/null -w "Vote App HTTP Status: %{http_code}\n" -H "Host: vote.ddgames.ru" http://$INGRESS_IP
      curl -s -o /dev/null -w "Result App HTTP Status: %{http_code}\n" -H "Host: result.ddgames.ru" http://$INGRESS_IP
  environment:
    name: production
    url: https://vote.ddgames.ru
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual