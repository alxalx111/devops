apiVersion: v1
kind: ServiceAccount
metadata:
  name: write-user
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: write-role
  namespace: default
rules:
- apiGroups: ["", "apps", "extensions"]
  resources: ["pods", "deployments", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: write-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: write-user
  namespace: default
roleRef:
  kind: Role
  name: write-role
  apiGroup: rbac.authorization.k8s.io
